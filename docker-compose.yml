x-logging:
  &default-logging
  logging:
    driver: json-file
    options:
      max-size: 100M

services:

  backend:
    build: ./backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - judge0-server
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/codzilla
      JUDGE0_URL: http://judge0-server:2358

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: codzilla
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    volumes:
      - app-data:/var/lib/postgresql/data

  judge0-server:
    image: judge0/judge0:latest
    volumes:
      - ./judge0/judge0.conf:/judge0.conf:ro
    ports:
      - "2358:2358"
    privileged: true
    depends_on:
      - judge0-db
      - judge0-redis
    <<: *default-logging
    restart: always

  judge0-worker:
    image: judge0/judge0:latest
    command: ["./scripts/workers"]
    volumes:
      - ./judge0/judge0.conf:/judge0.conf:ro
    privileged: true
    depends_on:
      - judge0-db
      - judge0-redis
    <<: *default-logging
    restart: always

  judge0-db:
    image: postgres:16.2
    env_file: ./judge0/judge0.conf
    volumes:
      - judge0-data:/var/lib/postgresql/data/
    <<: *default-logging
    restart: always

  judge0-redis:
    image: redis:7.2.4
    command: [
      "bash", "-c",
      'docker-entrypoint.sh --appendonly no --requirepass "$$REDIS_PASSWORD"'
    ]
    env_file: ./judge0/judge0.conf
    <<: *default-logging
    restart: always

volumes:
  app-data:
  judge0-data: